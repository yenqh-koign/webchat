name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark this release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish WebChat
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Verify Python sources
        shell: pwsh
        run: |
          python -m py_compile app.py auth_routes.py auth_utils.py config.py email_utils.py image_utils.py models.py

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm app.spec
          if (!(Test-Path -LiteralPath "dist/WebChat.exe")) {
            throw "dist/WebChat.exe was not created."
          }

      - name: Package release asset
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          $releaseDir = Join-Path $env:RUNNER_TEMP "WebChat"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          Copy-Item -LiteralPath "dist/WebChat.exe" -Destination (Join-Path $releaseDir "WebChat.exe") -Force
          Copy-Item -LiteralPath ".env.example" -Destination (Join-Path $releaseDir ".env.example") -Force
          Copy-Item -LiteralPath "README.md" -Destination (Join-Path $releaseDir "README.md") -Force

          $asset = Join-Path $PWD "WebChat-Windows-$tag.zip"
          if (Test-Path -LiteralPath $asset) {
            Remove-Item -LiteralPath $asset -Force
          }
          Compress-Archive -Path (Join-Path $releaseDir "*") -DestinationPath $asset

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag }}"
          $asset = "WebChat-Windows-$tag.zip"
          $args = @(
            "release", "create", $tag, $asset,
            "--target", $env:GITHUB_SHA,
            "--title", "WebChat $tag",
            "--notes", "Windows release build for WebChat.",
            "--latest"
          )
          if ("${{ inputs.prerelease }}" -eq "true") {
            $args += "--prerelease"
          }
          gh @args
